<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Khan Academy clone</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/brace-fold.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      padding: 100px;
      display: flex;
      height: 100vh;
      font-family: monospace;
    }

    /* Restart button */
    #restartBtn {
        position: absolute;
        bottom: 80px;
        left: 50%;
        z-index: 9999;
        padding: 6px 10px;
        font-family: monospace;
        cursor: pointer;
        background: #ffffff;
        color: rgb(0, 17, 255);
        border: 1px solid rgb(0, 17, 255);
        border-radius: 4px;
    }

    #editor {
        flex: 1;
        height: 100%;
        min-width: 300px;
        border-right: 1px solid rgba(0,0,0,0.2);
    }

    .CodeMirror {
        height: 100%;
        font-size: 12px;
        background:rgba(0,0,0,0.02);
        color: #000000;
    }

    #preview {
        width: auto;
        background: #ffffff;
        overflow: hidden;
        margin: 0;
        border: none;
        position: relative;
    }

    #preview iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }
  </style>
</head>

<body>

    <!-- Restart button -->
    <button id="restartBtn">Restart</button>

    <div id="editor"></div>
    <div id="preview"></div>

    <script src="editor.js"></script>

</body>
</html>
